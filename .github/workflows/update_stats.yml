name: Update GitHub Stats
on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 18 * * *"  # Run daily at 6:30 PM UTC
  workflow_dispatch:     # Allow manual triggering

# Prevent multiple workflow runs executing at the same time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' 
      
      - name: Install dependencies
        run: pip install -r cache/requirements.txt
      
      - name: Update GitHub stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          ENABLE_ARCHIVE: "true"
        run: python update_stats.py
      
      - name: Commit if changed
        id: commit
        run: |
          git config --global user.email "github-actions-bot@sriram-pr.github.io"
          git config --global user.name "Sriram-PR/GitHub-Actions-Bot"
          git add dark_mode.svg light_mode.svg cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update GitHub stats - $(date +'%Y-%m-%d')"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push
        if: steps.commit.outputs.changed == 'true'
        run: git push