<?xml version='1.0' encoding='UTF-8'?>
<!-- 
  This SVG file defines the dark mode version of the GitHub profile statistics badge.
  Elements with 'id' attributes are dynamically updated by update_stats.py.
  
  Dynamic elements:
  - age_data: User's age in years, months, days
  - repo_data: Number of repositories
  - contrib_data: Number of repositories contributed to
  - star_data: Number of stars
  - commit_data: Number of commits
  - follower_data: Number of followers
  - loc_data: Total lines of code
  - loc_add: Lines of code added
  - loc_del: Lines of code deleted
  
  Each element has a corresponding '_dots' element for alignment.
